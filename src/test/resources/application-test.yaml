
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20

  liquibase:
    enabled: false

  springdoc:
    api-docs:
      enabled=false:

logging:
  level:
    org.testcontainers: INFO
    org.springframework.test: DEBUG
    by.egrius.pizzaShop: DEBUG